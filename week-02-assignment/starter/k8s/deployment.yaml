apiVersion: apps/v1
kind: Deployment
metadata:
  name: demand-api
  labels:
    app: demand-api

spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: demand-api

  template:
    metadata:
      labels:
        app: demand-api
    spec:
      initContainers:
      - name: download-data
        image: google/cloud-sdk:slim
        command:
          - /bin/sh
          - -c
          - |
            gsutil cp gs://${GCS_BUCKET}/demand_enriched.parquet /data/processed/
            gsutil cp gs://${GCS_BUCKET}/lgbm_demand_model.txt /data/processed/
        env:
        - name: GCS_BUCKET
          valueFrom:
            configMapKeyRef:
              name: demand-api-config
              key: GCS_BUCKET
        volumeMounts:
        - name: data
          mountPath: /data/processed

      containers:
      - name: demand-api
        image: us-central1-docker.pkg.dev/assignment02-494503/docker-repo/demand-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000

        env:
        - name: GCS_BUCKET
          valueFrom:
            configMapKeyRef:
              name: demand-api-config
              key: GCS_BUCKET

        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10

        volumeMounts:
        - name: data
          mountPath: /data/processed

      volumes:
      - name: data
        emptyDir: {}